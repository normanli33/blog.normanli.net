{{ define "main" }}
<section class="list-head">
  <div class="container prose">
    <span class="eyebrow">Lab</span>
    <h1>{{ .Title }}</h1>
    <p>{{ .Content }}</p>
  </div>
</section>
<section class="container">
  <div class="card-grid" style="padding:2rem 0;">
    {{ range .Pages.ByDate.Reverse }}
    <a class="entry-card" href="{{ .RelPermalink }}">
      <span class="status-chip {{ .Params.status | default "active" }}">{{ .Params.status | default "active" }}</span>
      <div class="title">{{ .Title }}</div>
      <div class="meta">{{ .Params.stack }}</div>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
