{{ define "main" }}
<article>
  <p class="ledger"><b>{{ .Section | upper }}</b> · {{ .Date.Format "2 Jan 2006" }} · {{ .ReadingTime }} min read</p>
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p class="dek">{{ . }}</p>{{ end }}

  {{ if .WordCount | ge 800 }}
  <nav class="toc-inline" aria-label="Contents">
    <span class="ledger">Contents</span>
    {{ .TableOfContents }}
  </nav>
  {{ end }}

  <div class="content">{{ .Content }}</div>
</article>
{{ end }}
