{{ define "main" }}
<div class="page-head">
  <div class="meta">
    <time>{{ .Date.Format "2 Jan 2006" }}</time>
    <span class="sep">·</span>
    <span>{{ .ReadingTime }} min read</span>
    <span class="sep">·</span>
    <a href="/{{ .Section }}/" style="color:var(--accent)">{{ .Section | humanize }}</a>
  </div>
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p>{{ . }}</p>{{ end }}
  {{ with .Params.tags }}<div class="tags">{{ range . }}<span class="tag">{{ . }}</span>{{ end }}</div>{{ end }}
</div>
<div class="content">{{ .Content }}</div>
{{ end }}
