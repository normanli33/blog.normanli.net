{{ define "main" }}
<div style="margin:3rem 0 2rem">
  <p class="ledger" style="margin:0 0 .3rem"><b>{{ .Title | upper }}</b></p>
  {{ with .Description }}<p style="color:var(--muted);font-size:1rem;margin:0">{{ . }}</p>{{ end }}
</div>
{{ range .Pages.ByDate.Reverse }}
<a class="entry" href="{{ .RelPermalink }}">
  <span class="entry-date">{{ .Date.Format "2 Jan 2006" }}</span>
  <span class="entry-title">{{ .Title }}<span>{{ with .Params.tags }}{{ index . 0 }}{{ end }} · {{ .ReadingTime }} min</span></span>
</a>
{{ end }}
{{ end }}
