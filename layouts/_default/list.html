{{ define "main" }}<header class="page-hero shell"><span class="kicker">{{ .Section | humanize }}</span><h1>{{ .Title }}</h1><p>{{ .Description }}</p></header><section class="shell listing-grid">{{ range .Pages }}<a class="listing-card" href="{{ .RelPermalink }}"><div class="card-meta"><span class="pill">{{ with index .Params.tags 0 }}{{ . }}{{ else }}{{ $.Section }}{{ end }}</span><span>{{ .ReadingTime }} min</span></div><h2>{{ .Title }}</h2><p>{{ .Summary }}</p><span class="card-link">Read more →</span></a>{{ end }}</section>{{ end }}
