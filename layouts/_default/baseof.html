<!doctype html>
<html lang="{{ site.Language.Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <meta name="theme-color" content="#faf9f5" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1b1b17" media="(prefers-color-scheme: dark)">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · Norman Li{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="alternate" type="application/rss+xml" href="{{ "index.xml" | absURL }}" title="{{ site.Title }}">
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · Norman Li{{ end }}</title>
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"{{ if .IsPage }}Article{{ else }}WebSite{{ end }}","name":{{ .Title | jsonify }},"url":{{ .Permalink | jsonify }},"description":{{ (or .Description site.Params.description) | jsonify }},"author":{"@type":"Person","name":"Norman Li"}}</script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  {{ partial "header.html" . }}
  <main id="main" class="wrap page">{{ block "main" . }}{{ end }}</main>
  {{ partial "footer.html" . }}
  <script src="{{ "js/main.js" | relURL }}" defer></script>
</body>
</html>
