<header class="site-header">
  <div class="container nav">
    <a class="word" href="{{ "/" | relURL }}">Norman Li</a>
    <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-links">Menu</button>
    <ul class="nav-links" id="nav-links">
      {{ range .Site.Menus.main }}
      <li><a href="{{ .URL | relURL }}" {{ if $.IsMenuCurrent "main" . }}aria-current="page"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
    </ul>
    <div class="nav-right">
      <button class="search-trigger" id="search-trigger" aria-haspopup="dialog">
        Search <span class="kbd">⌘K</span>
      </button>
      <button class="icon-btn" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">◐</button>
    </div>
  </div>
</header>
