<header>
  <a class="wordmark" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
  <nav aria-label="Site">
    <a href="{{ "/" | relURL }}"{{ if or .IsHome (eq .Section "writing") }} aria-current="page"{{ end }}>Writing</a>
    <a href="{{ "/projects/" | relURL }}"{{ if eq .Section "projects" }} aria-current="page"{{ end }}>Projects</a>
    <a href="{{ "/about/" | relURL }}"{{ if eq .RelPermalink "/about/" }} aria-current="page"{{ end }}>About</a>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle colour theme">&#9685; theme</button>
  </nav>
</header>
