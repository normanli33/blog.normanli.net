baseURL = "https://normanli.net/"
languageCode = "en-au"
title = "Norman Li"
enableRobotsTXT = true
timeZone = "Australia/Sydney"

[params]
  author = "Norman Li"
  description = "Supply chain analyst in Sydney. Demand forecasting, procurement automation, Python, SQL, Power BI, LLM pipelines."

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML"]

[sitemap]
  changefreq = "monthly"
