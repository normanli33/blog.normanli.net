baseURL = "https://normanli.net/"
languageCode = "en-au"
title = "Norman Li — Systems, decisions, outcomes"
enableRobotsTXT = true

[params]
  description = "Supply chain, analytics and practical AI — explained through clear models and real work."
  mainSections = ["analysis", "projects", "knowledge", "study"]
  author = "Norman Li"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "github-dark"
    noClasses = false

[outputs]
  home = ["HTML", "RSS", "JSON"]

[outputFormats.JSON]
  mediaType = "application/json"
  baseName = "index"
  isPlainText = true

